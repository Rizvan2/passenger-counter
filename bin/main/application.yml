server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: passenger-counter
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true

ftp:
  port: 2022
  user: admin
  password: admin
  # CarCam: {deviceId}/{YYYY-MM-DD}/*.avi
  home: ./videos
  processed-dir: ./videos/processed
  passive:
    ports: 30000-30010
    external-address: ""
  # true  = тестовый режим: ролик перемещается в processed/<статус>/ после анализа
  #         (виден через интерфейс, можно проверить результат вручную)
  # false = продовый режим: ролик сразу удаляется после анализа
  keep-after-analysis: true   # тест — файлы в processed/finished/ или processed/failed/
#    keep-after-analysis: false  # прод — файлы удаляются сразу после анализа
  analysis:
    line-y-ratio: 0.5
    inside-on-top: false   # салон снизу — камера из глубины салона смотрит на дверь
    auto-initial-onboard: true
    initial-onboard: 0

pc:
  models-dir: ./models
  videos-dir: ./videos
  local-ingest:
    enabled: ${PC_LOCAL_INGEST_ENABLED:true}
    scan-interval-ms: ${PC_LOCAL_INGEST_SCAN_INTERVAL_MS:15000}
  min-frame-height: 480
  yolo-input-size: 416
  confidence-threshold: 0.35
  nms-iou-threshold: 0.5
  reid-similarity-threshold: 0.65
  track-active-lost-frames: 45
  track-center-distance-threshold-px: 90
  side-fallback-max-distance-px: 250
  process-every-n-frames: 3
  emit-frame-every-ms: 120
  jpeg-quality: 0.45
  analysis-log-every-n-frames: 30
  door-zone-half-width-ratio: 0.04
  door-zone-min-half-width-px: 16
  door-zone-max-half-width-px: 60
  count-anchor-y-ratio: 0.75
  count-min-anchor-movement-px: 40
  count-center-line-crossing: false
  count-min-stable-frames: 3

analysis-results:
  persistence:
    enabled: ${ANALYSIS_RESULTS_PERSISTENCE_ENABLED:true}

logging:
  level:
    ru.rtds.pc: DEBUG
    org.bytedeco: WARN
